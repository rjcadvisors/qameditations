---
layout: default
---
<style>
  .post-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 72px 32px 80px;
  }

  .post-meta {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 24px;
  }

  .post-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(30px, 5vw, 48px);
    font-weight: 300;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .post-description {
    font-family: 'EB Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 48px;
    padding-bottom: 48px;
    border-bottom: 1px solid var(--rule);
    line-height: 1.7;
  }

  .post-body h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 400;
    color: var(--ink);
    margin: 56px 0 20px;
    line-height: 1.25;
  }

  .post-body p {
    font-size: 18px;
    color: var(--ink-mid);
    line-height: 1.85;
    margin-bottom: 24px;
  }

  .post-body strong {
    color: var(--ink);
    font-weight: 600;
  }

  .post-body em {
    font-style: italic;
    color: var(--ink-mid);
  }

  .post-body ul, .post-body ol {
    margin: 0 0 24px 28px;
    color: var(--ink-mid);
  }

  .post-body li {
    font-size: 18px;
    line-height: 1.8;
    margin-bottom: 8px;
  }

  .post-body blockquote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    font-weight: 300;
    color: var(--ink-mid);
    border-left: 2px solid var(--amber-glow);
    padding: 4px 0 4px 20px;
    margin: 32px 0;
    line-height: 1.6;
  }

  .post-body hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 48px 0;
  }

  .post-body a {
    color: var(--amber-deep);
    text-decoration: underline;
    text-decoration-color: var(--rule);
    transition: color 0.2s;
  }

  .post-body a:hover { color: var(--amber); }

  .post-footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }

  .post-footer-author {
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .post-footer-back {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    text-decoration: none;
    transition: color 0.2s;
  }

  .post-footer-back:hover { color: var(--amber-deep); }
</style>

<div class="post-container">
  <div class="post-meta">
    {{ page.date | date: "%B %Y" }}
  </div>
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.description %}
  <p class="post-description">{{ page.description }}</p>
  {% endif %}

 <div class="post-body">
    {{ content }}
  </div>
  {% include subscribe-form.html %}
  <div class="post-footer">

  <div class="post-footer">
    <span class="post-footer-author">Rick Cavallaro · RJCadvisors Inc.</span>
    <a href="/blog/" class="post-footer-back">&larr; All Posts</a>
  </div>
</div>
