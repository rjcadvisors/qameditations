<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — QA Meditations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:   #f5f0e8;
      --parchment-2: #ede5d4;
      --parchment-3: #e2d9c5;
      --ink:         #1c1810;
      --ink-mid:     #3d3428;
      --ink-soft:    #6b5e4a;
      --ink-faint:   #9a8c78;
      --amber:       #c47c2b;
      --amber-deep:  #9b5e1a;
      --amber-glow:  #e8a84a;
      --rule:        #c9bda8;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--parchment);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 420px;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(196,124,43,0.12) 0%, transparent 70%);
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 24px 48px;
      border-bottom: 1px solid var(--rule);
    }

    .site-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .site-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(38px, 7vw, 68px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 14px;
      text-decoration: none;
      display: block;
    }

    .site-title em { font-style: italic; color: var(--amber-deep); }

    .site-rule {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      margin: 20px auto;
    }

 nav {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--rule);
      flex-wrap: wrap;
    }

    @media (max-width: 480px) {
      nav {
        gap: 12px 20px;
        padding: 16px 12px;
      }
      nav a {
        font-size: 9px;
      }
    }

    nav a {
      font-family: 'Cinzel', serif;

      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.2s;
      white-space: nowrap;
    }

    nav a:hover, nav a.active { color: var(--amber); }

    @media (max-width: 480px) {
      nav {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        gap: 20px;
        padding: 16px 20px;
      }
      nav a {
        font-size: 9px;
        flex: 0 0 auto;
      }
    }

                                                                                    main {

      z-index: 1;
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--rule);
      padding: 36px 32px;
      text-align: center;
      margin-top: 80px;
    }

    .footer-logo {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .footer-copy {
      font-size: 12px;
      color: var(--ink-faint);
      font-style: italic;
    }
  </style>
</head>

  <main>

  <footer>

    <p class="footer-copy">

</html>
