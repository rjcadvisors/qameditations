<!-- 
  Subscribe form — drop this file in _includes/subscribe-form.html
  Then add {% include subscribe-form.html %} to your post layout
  (e.g. _layouts/post.html), typically right after the article content.

  SETUP: Replace YOUR_SUBSCRIBE_FORM_ID below with your Formspree form ID.
  Create a separate Formspree form for this (don't reuse the white paper
  form ID) so subscriber leads don't mix with white paper leads.
-->

<div class="subscribe-box">
  <p class="subscribe-heading">Notify me of new posts</p>
  <p class="subscribe-subtext">Get an email when a new QA Meditations article goes up. No spam, unsubscribe anytime.</p>

  <form
    action="https://formspree.io/f/xwvdlbyw"
    method="POST"
    class="subscribe-form"
    id="subscribe-form"
  >
    <input type="email" name="email" placeholder="you@email.com" required class="subscribe-input">
    <input type="hidden" name="source" value="blog-subscribe">
    <input type="hidden" name="_subject" value="New QA Meditations subscriber">
    <button type="submit" class="subscribe-button">Subscribe</button>
  </form>

  <p class="subscribe-confirm" id="subscribe-confirm" style="display:none;">
    Thanks — you're on the list.
  </p>
</div>

<style>
  .subscribe-box {
    margin: 3rem 0 2rem;
    padding: 1.5rem;
    border: 1px solid #2d3748;
    border-radius: 8px;
    background: #f8f9fa;
  }
  .subscribe-heading {
    font-weight: 600;
    font-size: 1.05rem;
    margin: 0 0 0.25rem;
  }
  .subscribe-subtext {
    font-size: 0.9rem;
    color: #555;
    margin: 0 0 1rem;
  }
  .subscribe-form {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .subscribe-input {
    flex: 1;
    min-width: 200px;
    padding: 0.6rem 0.8rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.95rem;
  }
  .subscribe-button {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 6px;
    background: #1a5c35;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
  }
  .subscribe-button:hover {
    background: #144a2b;
  }
</style>

<script>
  // Optional: intercept submit to show inline confirmation instead of
  // redirecting to Formspree's default thank-you page.
  document.addEventListener("DOMContentLoaded", function () {
    var form = document.getElementById("subscribe-form");
    var confirmMsg = document.getElementById("subscribe-confirm");
    if (!form) return;

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var data = new FormData(form);
      fetch(form.action, {
        method: "POST",
        body: data,
        headers: { Accept: "application/json" }
      })
        .then(function (response) {
          if (response.ok) {
            form.style.display = "none";
            confirmMsg.style.display = "block";
          } else {
            alert("Something went wrong — please try again.");
          }
        })
        .catch(function () {
          alert("Something went wrong — please try again.");
        });
    });
  });
</script>
